<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>barz</title>
    <meta name="theme-color" content="#050A14" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <div class="bg-grid" aria-hidden="true"></div>
    <div class="bg-vignette" aria-hidden="true"></div>
    <div class="bg-scanlines" aria-hidden="true"></div>

    <div class="page-corners" aria-hidden="true">
      <span class="pc tl"></span>
      <span class="pc tr"></span>
      <span class="pc bl"></span>
      <span class="pc br"></span>
    </div>

    <main class="panel" id="panel">

      <header class="panel-chrome" aria-hidden="true">
        <div class="chrome-dots">
          <i class="cd"></i>
          <i class="cd"></i>
          <i class="cd"></i>
        </div>
        <span class="chrome-label">linkboard_v3.rpm</span>
        <span class="clock" id="clock">--:--</span>
      </header>

      <div class="panel-body">

        <section class="profile" aria-label="Perfil de Barz">
          <div class="profile-top">
            <div class="avatar-frame">
              <div class="avatar-cut">
                <img src="barzpfpwoah.jpg" alt="Foto de perfil de Barz" class="avatar-img" />
              </div>
              <div class="avatar-hud" aria-hidden="true">
                <span class="hud-line h top"></span>
                <span class="hud-line h bot"></span>
                <span class="hud-line v left"></span>
                <span class="hud-line v right"></span>
              </div>
            </div>
            <div class="profile-info">
              <p class="profile-sys" aria-hidden="true">SYS_ID: PXL-001</p>
              <h1 class="profile-name">barz</h1>
              <p class="profile-handle">@pixelbarz</p>
              <div class="profile-status">
                <span class="status-pip" aria-hidden="true"></span>
                <span>ONLINE</span>
              </div>
            </div>
          </div>

          <div class="profile-bio">
            <p>olha sou eu</p>
            <p>Despite everything, it's still you!</p>
          </div>

          <div class="music-player" id="musicPlayer">
            <div class="mp-header" aria-hidden="true">
              <span class="mp-label">NOW PLAYING</span>
              <span class="mp-eq" id="mpEq" aria-hidden="true">
                <i class="eq-b"></i>
                <i class="eq-b"></i>
                <i class="eq-b"></i>
                <i class="eq-b"></i>
              </span>
            </div>
            <div class="mp-row">
              <div class="mp-art">
                <img src="eva.png" alt="Capa: 4555 - MeiaUm" />
              </div>
              <button class="mp-btn" id="musicToggle" type="button" aria-pressed="false" aria-controls="siteTrack">
                <span class="mp-track">残酷な天使のテーゼ (Evangelion opening)</span>
                <span class="mp-ctrl" id="musicControl" aria-hidden="true">&#9654;</span>
              </button>
            </div>
            <audio id="siteTrack" preload="metadata">
              <source src="eva.mp3" type="audio/mpeg" />
            </audio>
          </div>
        </section>

        <div class="divider" aria-hidden="true">
          <span class="div-line"></span>
          <span class="div-label">SELECT ACTION</span>
          <span class="div-line"></span>
        </div>

        <section class="links-section" aria-label="Links principais">
          <button class="terminal-trigger" id="terminalOpenBtn" type="button" aria-haspopup="dialog">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 4h16v14H4V4Zm2 2v10h12V6H6Zm1 2 3 2-3 2V8Zm4 4h4v1h-4v-1Z"/></svg>
            <span>TERMINAL</span>
            <span class="trig-arrow" aria-hidden="true">_</span>
          </button>

          <nav aria-label="Links">
            <a class="link-card" href="https://josebraz.cc" target="_blank" rel="noreferrer">
              <span class="lc-marker" aria-hidden="true"></span>
              <span class="lc-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 4h18v14H3V4Zm2 2v10h14V6H5Zm5 14h4v-2h-4v2Z"/></svg>
              </span>
              <span class="lc-text">
                <span class="lc-label">Portfólio</span>
                <span class="lc-url">josebraz.cc</span>
              </span>
              <span class="lc-arrow" aria-hidden="true">↗</span>
            </a>

            <a class="link-card" href="https://x.com/pixelbarz" target="_blank" rel="noreferrer">
              <span class="lc-marker" aria-hidden="true"></span>
              <span class="lc-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.53 3h3.43l-7.5 8.57L22 21h-6.6l-5.16-6.3L4.73 21H1.3l8.02-9.18L2 3h6.77l4.66 5.73L17.53 3Zm-1.2 16.04h1.9L7.73 4.87H5.7l10.63 14.17Z"/></svg>
              </span>
              <span class="lc-text">
                <span class="lc-label">X / Twitter</span>
                <span class="lc-url">@pixelbarz</span>
              </span>
              <span class="lc-arrow" aria-hidden="true">↗</span>
            </a>

            <a class="link-card" href="https://github.com/pixelbarz" target="_blank" rel="noreferrer">
              <span class="lc-marker" aria-hidden="true"></span>
              <span class="lc-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.385.6.111.82-.261.82-.577 0-.285-.012-1.04-.017-2.04-3.338.726-4.042-1.61-4.042-1.61-.546-1.387-1.333-1.757-1.333-1.757-1.089-.745.083-.73.083-.73 1.205.084 1.84 1.236 1.84 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.418-1.305.762-1.605-2.665-.305-5.467-1.333-5.467-5.932 0-1.31.468-2.381 1.235-3.221-.124-.304-.535-1.527.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.046.138 3.004.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.649.242 2.872.118 3.176.77.84 1.233 1.911 1.233 3.221 0 4.61-2.807 5.624-5.479 5.921.43.372.823 1.103.823 2.222 0 1.606-.014 2.903-.014 3.297 0 .319.218.694.825.576C20.565 21.796 24 17.297 24 12 24 5.37 18.63 0 12 0z"/></svg>
              </span>
              <span class="lc-text">
                <span class="lc-label">GitHub</span>
                <span class="lc-url">pixelbarz</span>
              </span>
              <span class="lc-arrow" aria-hidden="true">↗</span>
            </a>

            <a class="link-card" href="https://www.twitch.tv/pixelbarz" target="_blank" rel="noreferrer">
              <span class="lc-marker" aria-hidden="true"></span>
              <span class="lc-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 2h16v11.5l-4.5 4.5H12L9 22v-4H4V2Zm2 2v12h5v3l3-3h4.5l2.5-2.5V4H6Zm3 2h2v6H9V6Zm5 0h2v6h-2V6Z"/></svg>
              </span>
              <span class="lc-text">
                <span class="lc-label">Twitch</span>
                <span class="lc-url">pixelbarz</span>
              </span>
              <span class="lc-arrow" aria-hidden="true">↗</span>
            </a>
          </nav>
        </section>

        <footer class="panel-footer">
          <span>feito por mim :P</span>
          <span class="footer-sep" aria-hidden="true">//</span>
          <span>2026</span>
        </footer>

      </div>
    </main>

    <div class="terminal-overlay" id="terminalOverlay" aria-hidden="true"></div>

    <div class="terminal-popup" id="terminalPopup" role="dialog" aria-modal="true" aria-label="Terminal" aria-hidden="true">
      <div class="terminal">
        <header class="terminal-head">
          <div class="th-dots">
            <span id="terminalCloseDot" class="th-dot close" role="button" tabindex="0" aria-label="Fechar terminal"></span>
            <span class="th-dot"></span>
            <span class="th-dot"></span>
          </div>
          <span class="th-title">barz@linkboard:~</span>
          <button class="th-close-btn" id="terminalCloseBtn" type="button" aria-label="Fechar terminal">&#x2715;</button>
        </header>
        <div class="terminal-body" id="terminalOutput" aria-live="polite"></div>
        <form class="terminal-form" id="terminalForm" autocomplete="off">
          <label class="terminal-prompt" for="terminalInput">
            <span class="tp-user">barz@linkboard</span><span class="tp-sep">:</span><span class="tp-path">~</span><span class="tp-dollar">$</span>
          </label>
          <input
            class="terminal-input"
            id="terminalInput"
            name="terminal"
            type="text"
            spellcheck="false"
            placeholder="Digite um comando..."
            aria-label="Comando do terminal"
          />
        </form>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
